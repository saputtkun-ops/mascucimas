<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA & Mobile Web App Meta Tags -->
    <title>Mas Cuci Mas - Premium Shoe Care OS</title>
    <meta name="description" content="Aplikasi Sistem Operasional POS & Laundry Sepatu Modern Mas Cuci Mas" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- iOS / Safari Mobile PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MasCuciMas" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body style="margin: 0; background-color: #0f172a; color: #ffffff;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Clear Stale Service Workers & Register Fresh SW -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
          });
        });
      }
    </script>
  </body>
</html>
